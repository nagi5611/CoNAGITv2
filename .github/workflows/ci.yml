# CI: lint, TypeScript, secret scan (フェーズ A 完了条件)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Bundle (dry-run)
        run: npm run build

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # フェーズ M: リポジトリ Variables で `ENABLE_PLAYWRIGHT_SMOKE` を `true` にしたときのみ実行（Vite のみでスモーク可）
  playwright-smoke:
    if: ${{ vars.ENABLE_PLAYWRIGHT_SMOKE == 'true' }}
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start Vite and wait for readiness
        run: |
          npm run web:dev &
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:5173/ >/dev/null; then
              echo "Vite ready"
              exit 0
            fi
            sleep 1
          done
          echo "Vite did not become ready in time"
          exit 1

      - name: Playwright smoke
        run: npx playwright test
        env:
          E2E_BASE_URL: http://127.0.0.1:5173

  license-audit:
    if: ${{ vars.ENABLE_LICENSE_AUDIT == 'true' }}
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: License summary (production deps)
        run: npx license-checker-rseidelsohn --production --direct --summary
